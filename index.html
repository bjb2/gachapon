<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ガチャポン ✦ Capsule Toy</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=M+PLUS+Rounded+1c:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --cream: #FFF8F2;
  --body-top: #F2EDE6;
  --body-mid: #E8E0D5;
  --body-shd: #C8BFB5;
  --pink:    #FF6B9D;
  --yellow:  #FFD166;
  --mint:    #4ECDC4;
  --blue:    #74B9FF;
  --purple:  #A29BFE;
  --gold:    #FFD700;
  --ink:     #2D2A26;
  --mid:     #6B6560;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  min-height: 100vh;
  background: #FDEEF5;
  background-image:
    radial-gradient(ellipse at 15% 15%, #FFE4EF 0%, transparent 55%),
    radial-gradient(ellipse at 85% 85%, #DEE8FF 0%, transparent 55%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: 28px 16px 48px;
  font-family: 'M PLUS Rounded 1c', sans-serif;
  overflow-x: hidden;
}

.site-title {
  font-family: 'DotGothic16', monospace;
  font-size: clamp(1.1rem, 4vw, 1.6rem);
  color: var(--ink);
  letter-spacing: 0.12em;
  text-align: center;
}
.site-sub {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.25em;
  color: var(--mid);
  text-align: center;
  margin-top: 4px;
  margin-bottom: 22px;
}

/* ── DOME ── */
.dome-outer {
  width: 230px;
  height: 155px;
  position: relative;
  z-index: 2;
}
.dome-shell {
  position: absolute;
  inset: 0;
  border-radius: 115px 115px 0 0;
  border: 3px solid rgba(160,200,240,0.75);
  border-bottom: none;
  overflow: hidden;
  background: linear-gradient(160deg, rgba(215,238,255,0.88) 0%, rgba(190,222,248,0.72) 45%, rgba(175,212,242,0.62) 100%);
}
#domeCanvas {
  position: absolute;
  top: 3px; left: 3px;
  display: block;
}
/* Glass reflections layer — sits on top of canvas */
.dome-glass {
  position: absolute;
  inset: 0;
  border-radius: inherit;
  pointer-events: none;
}
.dome-glass::before {
  content: '';
  position: absolute;
  top: 14px; left: 18px;
  width: 30px; height: 80px;
  background: rgba(255,255,255,0.22);
  border-radius: 50%;
  transform: rotate(-18deg);
}
.dome-glass::after {
  content: '';
  position: absolute;
  top: 10px; left: 58px;
  width: 13px; height: 38px;
  background: rgba(255,255,255,0.14);
  border-radius: 50%;
  transform: rotate(-12deg);
}

/* ── COLLAR + BODY ── */
.dome-collar {
  width: 250px;
  height: 14px;
  background: linear-gradient(180deg, #DDD5C8, #C8C0B4);
  border: 2px solid var(--body-shd);
  border-radius: 4px 4px 0 0;
  box-shadow: 0 2px 4px rgba(0,0,0,.12);
  z-index: 3;
}
.machine-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  position: relative;
}
.machine-body {
  width: 270px;
  background: linear-gradient(175deg, var(--body-top) 0%, var(--body-mid) 50%, #DDD4C6 100%);
  border: 2.5px solid var(--body-shd);
  border-top: none;
  border-radius: 0 0 26px 26px;
  padding: 14px 18px 18px;
  box-shadow: 0 10px 28px rgba(0,0,0,.16), 0 2px 5px rgba(0,0,0,.1), inset 0 1px 0 rgba(255,255,255,.5);
  z-index: 2;
  position: relative;
}
.machine-body::before, .machine-body::after {
  content: '';
  position: absolute;
  top: 16px;
  width: 8px; height: 8px;
  background: radial-gradient(circle at 35% 30%, #E8E0D8, #B0A8A0);
  border-radius: 50%;
  border: 1.5px solid #999;
}
.machine-body::before { left: 10px; }
.machine-body::after  { right: 10px; }

.brand-strip { text-align: center; margin-bottom: 12px; }
.brand-label {
  display: inline-block;
  background: var(--pink);
  color: white;
  font-family: 'DotGothic16', monospace;
  font-size: 9.5px;
  letter-spacing: 0.14em;
  padding: 4px 12px;
  border-radius: 4px;
  box-shadow: 0 2px 6px rgba(255,107,157,.45);
}

/* ── CONTROLS ── */
.controls-row { display: flex; align-items: center; gap: 14px; }
.left-panel { flex: 1; display: flex; flex-direction: column; gap: 8px; align-items: flex-start; }
.led-display {
  background: #12112A;
  border: 2px solid #2A2850;
  border-radius: 5px;
  padding: 4px 9px;
  font-family: 'DotGothic16', monospace;
  font-size: 10px;
  color: #4ECDC4;
  box-shadow: inset 0 2px 5px rgba(0,0,0,.5), 0 0 8px rgba(78,205,196,.2);
  letter-spacing: 0.06em;
  white-space: nowrap;
}
.lucky-circle {
  width: 50px; height: 50px;
  background: white;
  border: 2px solid #C0B8B0;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  box-shadow: inset 0 2px 4px rgba(0,0,0,.1);
}
.lucky-text { font-size: 7px; font-weight: 900; text-align: center; line-height: 1.3; color: var(--ink); }
.crank-panel { display: flex; flex-direction: column; align-items: center; gap: 6px; }
.crank-label { font-size: 7.5px; font-weight: 700; letter-spacing: 0.08em; color: var(--mid); }
.crank-btn {
  width: 64px; height: 64px;
  background: radial-gradient(circle at 33% 28%, #FFFFFF, #DDD5CC 45%, #C0B8B0);
  border: 3px solid #B0A8A0;
  border-radius: 50%;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: #666;
  box-shadow: 0 6px 14px rgba(0,0,0,.22), inset 0 1px 3px rgba(255,255,255,.8);
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  transition: box-shadow 0.1s;
}
.crank-btn:hover { box-shadow: 0 8px 18px rgba(0,0,0,.28), inset 0 1px 3px rgba(255,255,255,.8); }
.crank-btn:active { transform: scale(0.94); }
.crank-inner { transition: transform 0.32s cubic-bezier(0.34,1.4,0.64,1); display: flex; }
.progress-dots { display: flex; gap: 5px; }
.pdot {
  width: 9px; height: 9px;
  border-radius: 50%;
  background: #D0C8BE;
  border: 1.5px solid #B8B0A6;
  transition: background 0.25s, box-shadow 0.25s;
}
.pdot.lit { background: var(--pink); border-color: #E0507A; box-shadow: 0 0 7px rgba(255,107,157,.65); }

/* ── TRAY ── */
.tray {
  margin-top: 14px;
  background: linear-gradient(180deg, #C8C0B6 0%, #BEB6AC 100%);
  border: 2.5px solid #AAA29A;
  border-radius: 14px;
  height: 72px;
  display: flex; align-items: center; justify-content: center;
  position: relative;
  overflow: visible;
  box-shadow: inset 0 4px 14px rgba(0,0,0,.22);
}
.tray-flap {
  position: absolute; top: -1px; left: 50%; transform: translateX(-50%);
  width: 52px; height: 18px;
  background: linear-gradient(180deg, #C4BDB4, #D0C8BF);
  border: 1.5px solid #A8A09A;
  border-radius: 0 0 10px 10px;
  box-shadow: 0 3px 5px rgba(0,0,0,.12);
}
.tray-hint {
  font-size: 11px; font-weight: 700; color: #8A8278;
  font-family: 'DotGothic16', monospace;
  pointer-events: none; padding: 0 10px; text-align: center;
}
.tray-ball {
  width: 54px; height: 54px;
  border-radius: 50%;
  cursor: pointer;
  position: absolute;
  left: calc(50% - 27px);
  top: 9px;
  display: none;
  z-index: 10;
}
.tray-ball::before {
  content: '';
  position: absolute;
  top: 8px; left: 13px;
  width: 15px; height: 10px;
  background: rgba(255,255,255,.5);
  border-radius: 50%;
  transform: rotate(-32deg);
}
.tray-ball:hover { transform: scale(1.08) rotate(-4deg); }

/* ── BALL COLORS ── */
.b-common { background: radial-gradient(circle at 35% 30%, #FFFCE0, #FFD166 55%, #D4A000); box-shadow: 0 4px 9px rgba(0,0,0,.18); }
.b-rare   { background: radial-gradient(circle at 35% 30%, #C8EEFF, #74B9FF 55%, #0768CB); box-shadow: 0 4px 9px rgba(0,0,0,.18); }
.b-ultra  { background: radial-gradient(circle at 35% 30%, #FFFAD0, #FFD700 40%, #FF6B00 75%, #CC1A00); box-shadow: 0 4px 9px rgba(255,100,0,.4), 0 0 14px rgba(255,200,0,.5); animation: ultraG 2s ease-in-out infinite alternate; }
.b-pink   { background: radial-gradient(circle at 35% 30%, #FFE4F0, #FF6B9D 55%, #C00060); box-shadow: 0 4px 9px rgba(0,0,0,.18); }
.b-mint   { background: radial-gradient(circle at 35% 30%, #C0F8F4, #4ECDC4 55%, #009B90); box-shadow: 0 4px 9px rgba(0,0,0,.18); }
.b-purple { background: radial-gradient(circle at 35% 30%, #E8E4FF, #A29BFE 55%, #5A50E0); box-shadow: 0 4px 9px rgba(0,0,0,.18); }
@keyframes ultraG {
  from { box-shadow: 0 4px 9px rgba(255,100,0,.4), 0 0 14px rgba(255,200,0,.5); }
  to   { box-shadow: 0 4px 9px rgba(255,100,0,.6), 0 0 26px rgba(255,200,0,.85); }
}

/* ── ANIMATIONS ── */
@keyframes shake {
  0%,100% { transform: translateX(0); }
  15% { transform: translateX(-4px) rotate(-0.5deg); }
  35% { transform: translateX(4px) rotate(0.5deg); }
  55% { transform: translateX(-3px); }
  75% { transform: translateX(3px); }
}
.machine-wrap.shaking { animation: shake 0.35s ease; }

@keyframes ballDrop {
  0%   { top: -14px; opacity: 0.7; transform: scale(0.78); }
  46%  { top: 9px; opacity: 1; transform: scale(1.06); }
  62%  { top: 3px; transform: scale(0.97); }
  78%  { top: 9px; transform: scale(1.02); }
  90%  { top: 5px; transform: scale(1); }
  100% { top: 9px; transform: scale(1); opacity: 1; }
}
.tray-ball.dropping { display: block !important; animation: ballDrop 0.8s cubic-bezier(0.25,0.46,0.45,0.94) forwards; }
@keyframes ballWobble {
  0%,100% { transform: rotate(-3deg) scale(1); }
  50%     { transform: rotate(3deg) scale(1.04); }
}
.tray-ball.waiting { animation: ballWobble 2.4s ease-in-out infinite; }
.tray-ball.waiting:hover { animation: none; }
@keyframes popOpen {
  0%   { transform: scale(1); opacity: 1; }
  40%  { transform: scale(1.3); opacity: 0.9; }
  100% { transform: scale(0); opacity: 0; }
}
.tray-ball.popping { animation: popOpen 0.3s ease-out forwards !important; }

/* ── REFILL ── */
.refill-wrap { display: none; flex-direction: column; align-items: center; gap: 6px; padding: 8px; }
.refill-wrap.show { display: flex; }
.refill-btn {
  background: var(--mint); color: white; border: none;
  border-radius: 50px; padding: 8px 22px;
  font-family: 'M PLUS Rounded 1c', sans-serif;
  font-size: 13px; font-weight: 900; cursor: pointer;
  box-shadow: 0 4px 10px rgba(78,205,196,.4);
  transition: transform 0.15s;
}
.refill-btn:hover { transform: translateY(-2px); }
.refill-empty { font-size: 10px; color: #999; font-family: 'DotGothic16', monospace; }

/* ── HINT ── */
.hint-line {
  margin-top: 12px;
  font-size: 11.5px; font-weight: 700; color: var(--mid);
  text-align: center; min-height: 18px;
  font-family: 'DotGothic16', monospace; letter-spacing: 0.06em;
}

/* ── MODAL ── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(20,14,30,.55);
  backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
  z-index: 200;
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s;
  padding: 20px;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.reveal-card {
  background: var(--cream);
  border-radius: 28px;
  padding: 30px 26px 24px;
  max-width: 310px; width: 100%;
  text-align: center;
  box-shadow: 0 24px 70px rgba(0,0,0,.35);
  transform: scale(0.75) translateY(24px);
  transition: transform 0.45s cubic-bezier(0.34,1.56,0.64,1);
  position: relative; overflow: hidden;
}
.reveal-card::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at 50% 0%, rgba(255,230,100,.18) 0%, transparent 60%);
  pointer-events: none;
}
.modal-overlay.open .reveal-card { transform: scale(1) translateY(0); }
.rarity-banner {
  display: inline-block;
  font-family: 'DotGothic16', monospace; font-size: 10px;
  letter-spacing: 0.18em; padding: 4px 16px;
  border-radius: 20px; margin-bottom: 14px;
}
.rarity-banner.common { background: #FFF4C0; color: #8A6200; border: 2px solid #E5B800; }
.rarity-banner.rare   { background: #DAEEFF; color: #0058B0; border: 2px solid #74B9FF; }
.rarity-banner.ultra  {
  background: linear-gradient(90deg, #FFD700, #FF6B00); color: white;
  border: 2px solid #E05800;
  box-shadow: 0 2px 12px rgba(255,140,0,.55);
  animation: ultraBanner 1.5s ease-in-out infinite alternate;
}
@keyframes ultraBanner {
  from { box-shadow: 0 2px 12px rgba(255,140,0,.55); }
  to   { box-shadow: 0 2px 24px rgba(255,140,0,.9), 0 0 50px rgba(255,200,0,.35); }
}
.char-stage { width: 130px; height: 130px; margin: 0 auto 14px; }
.char-stage svg { width: 100%; height: 100%; }
@keyframes charPop {
  0%   { transform: scale(0) rotate(-12deg); }
  55%  { transform: scale(1.18) rotate(6deg); }
  78%  { transform: scale(0.93) rotate(-2deg); }
  100% { transform: scale(1) rotate(0deg); }
}
.char-stage.popped { animation: charPop 0.55s cubic-bezier(0.34,1.56,0.64,1) forwards; }
.rarity-stars { font-size: 18px; margin-bottom: 6px; letter-spacing: 3px; }
.char-name { font-size: 24px; font-weight: 900; color: var(--ink); margin-bottom: 6px; line-height: 1.1; }
.char-flavor { font-size: 13px; color: var(--mid); line-height: 1.6; margin-bottom: 20px; min-height: 40px; }
.close-btn {
  background: var(--pink); color: white; border: none;
  border-radius: 50px; padding: 11px 32px;
  font-family: 'M PLUS Rounded 1c', sans-serif;
  font-size: 15px; font-weight: 900; cursor: pointer;
  box-shadow: 0 5px 14px rgba(255,107,157,.45);
  transition: transform 0.15s, box-shadow 0.15s;
  letter-spacing: 0.04em;
}
.close-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(255,107,157,.55); }
.close-btn:active { transform: translateY(0); }
.sparkle {
  position: absolute; font-size: 18px; pointer-events: none;
  animation: sparkleOut 1.2s ease-out forwards;
}
@keyframes sparkleOut {
  0%   { opacity:1; transform: translate(0,0) scale(0); }
  40%  { opacity:1; transform: translate(var(--sx),var(--sy)) scale(1.2); }
  100% { opacity:0; transform: translate(calc(var(--sx)*1.6),calc(var(--sy)*1.8)) scale(0.4); }
}

/* ── COLLECTION ── */
.collection-wrap { margin-top: 18px; text-align: center; max-width: 340px; }
.collection-label { font-size: 10px; font-weight: 700; letter-spacing: 0.2em; color: var(--mid); margin-bottom: 8px; font-family: 'DotGothic16', monospace; }
.collection-chips { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; }
.chip {
  background: white; border: 2px solid #E0D8CE;
  border-radius: 20px; padding: 4px 11px;
  font-size: 11px; font-weight: 700; color: var(--mid);
  display: flex; align-items: center; gap: 5px;
  box-shadow: 0 2px 5px rgba(0,0,0,.07);
}
.chip.new-chip { border-color: var(--pink); color: var(--pink); animation: chipPop 0.4s cubic-bezier(0.34,1.56,0.64,1); }
@keyframes chipPop { from { transform: scale(0.5); } to { transform: scale(1); } }

@media (max-width: 380px) {
  .dome-outer { width: 200px; }
  .dome-collar { width: 218px; }
  .machine-body { width: 238px; }
  .crank-btn { width: 54px; height: 54px; }
}
</style>
</head>
<body>

<h1 class="site-title">ガチャポン</h1>
<p class="site-sub">CAPSULE TOY MACHINE</p>

<div class="machine-wrap" id="machineWrap">
  <div class="dome-outer">
    <div class="dome-shell" id="domeShell">
      <canvas id="domeCanvas"></canvas>
      <div class="dome-glass"></div>
    </div>
  </div>
  <div class="dome-collar"></div>
  <div class="machine-body">
    <div class="brand-strip"><span class="brand-label">★ LUCKY GACHA ★</span></div>
    <div class="controls-row">
      <div class="left-panel">
        <div class="led-display" id="ledDisplay">PULLS: 0</div>
        <div class="lucky-circle"><div class="lucky-text">LUCKY<br>BALL</div></div>
      </div>
      <div class="crank-panel">
        <div class="crank-label">TURN HERE</div>
        <div class="crank-btn" id="crankBtn">
          <div class="crank-inner" id="crankInner">
            <svg width="30" height="30" viewBox="0 0 30 30" fill="none">
              <path d="M15 5 A10 10 0 1 1 5 15" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
              <polygon points="15,1 15,9 20,5" fill="currentColor"/>
            </svg>
          </div>
        </div>
        <div class="progress-dots">
          <div class="pdot" id="dot0"></div>
          <div class="pdot" id="dot1"></div>
          <div class="pdot" id="dot2"></div>
        </div>
      </div>
    </div>
    <div class="tray" id="tray">
      <div class="tray-flap"></div>
      <div class="tray-hint" id="trayHint">Turn 3× to dispense!</div>
      <div class="refill-wrap" id="refillWrap">
        <span class="refill-empty">MACHINE EMPTY</span>
        <button class="refill-btn" id="refillBtn">↺ REFILL</button>
      </div>
      <div class="tray-ball" id="trayBall"></div>
    </div>
  </div>
</div>

<p class="hint-line" id="hintLine"></p>

<div class="collection-wrap" id="collectionWrap" style="display:none">
  <div class="collection-label">YOUR COLLECTION</div>
  <div class="collection-chips" id="collectionChips"></div>
</div>

<div class="modal-overlay" id="modal">
  <div class="reveal-card" id="revealCard">
    <div class="rarity-banner" id="rarityBanner">COMMON</div>
    <div class="char-stage" id="charStage"></div>
    <div class="rarity-stars" id="rarityStars">★</div>
    <div class="char-name" id="charName">Name</div>
    <div class="char-flavor" id="charFlavor">Flavor</div>
    <button class="close-btn" id="closeBtn">Nice! ✦</button>
  </div>
</div>

<script>
// ─── CHARACTERS ──────────────────────────────────────────────────
const CHARS = [
  {
    id: 'tanuki', name: 'Tanuki Tobikichi', rarity: 'common', ballClass: 'b-common',
    stars: '★',
    flavor: 'A raccoon dog who collects lost coins and swears each one is lucky. Has never been proven wrong.',
    svg: `<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="60" cy="90" rx="26" ry="20" fill="#8B6236"/>
      <circle cx="60" cy="56" r="38" fill="#8B6236"/>
      <ellipse cx="60" cy="66" rx="22" ry="16" fill="#D4A878"/>
      <circle cx="30" cy="28" r="14" fill="#8B6236"/><circle cx="90" cy="28" r="14" fill="#8B6236"/>
      <circle cx="30" cy="28" r="8" fill="#D4A878"/><circle cx="90" cy="28" r="8" fill="#D4A878"/>
      <circle cx="47" cy="50" r="8" fill="white"/><circle cx="73" cy="50" r="8" fill="white"/>
      <circle cx="49" cy="51" r="5" fill="#1A1410"/><circle cx="75" cy="51" r="5" fill="#1A1410"/>
      <circle cx="51" cy="49" r="1.5" fill="white"/><circle cx="77" cy="49" r="1.5" fill="white"/>
      <ellipse cx="60" cy="64" rx="5" ry="3.5" fill="#5A3A1A"/>
      <path d="M54 70 Q60 76 66 70" fill="none" stroke="#5A3A1A" stroke-width="2.5" stroke-linecap="round"/>
      <ellipse cx="38" cy="63" rx="7" ry="5" fill="rgba(255,140,80,0.4)"/>
      <ellipse cx="82" cy="63" rx="7" ry="5" fill="rgba(255,140,80,0.4)"/>
      <ellipse cx="60" cy="108" rx="20" ry="14" fill="#D4A878"/>
    </svg>`
  },
  {
    id: 'neko', name: 'Neko Nana', rarity: 'common', ballClass: 'b-pink',
    stars: '★',
    flavor: 'A sleepy cat who has been "almost awake" for three years. Incredibly soft. Smells like vanilla.',
    svg: `<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
      <circle cx="60" cy="62" r="40" fill="#FFB3CF"/>
      <polygon points="24,36 38,12 44,38" fill="#FFB3CF"/><polygon points="96,36 82,12 76,38" fill="#FFB3CF"/>

// ─── BALL STYLES for canvas rendering ──────────────────────────────
const BALL_STYLES = {
  'b-common': { hi:'#FFFCE0', mid:'#FFD166', lo:'#C49000', glow: null },
  'b-rare':   { hi:'#C8EEFF', mid:'#74B9FF', lo:'#0550B8', glow: null },
  'b-ultra':  { hi:'#FFFBE8', mid:'#FFD700', lo:'#E04800', glow:'rgba(255,200,0,0.65)' },
  'b-pink':   { hi:'#FFE6F4', mid:'#FF6B9D', lo:'#B0005A', glow: null },
  'b-mint':   { hi:'#C0FBF7', mid:'#4ECDC4', lo:'#008878', glow: null },
  'b-purple': { hi:'#EAE6FF', mid:'#A29BFE', lo:'#4840D8', glow: null },
};

// ─── BALL POOL ─────────────────────────────────────────────────────
function buildBallPool() {
  const pool = [];
  CHARS.forEach(c => {
    const count = c.rarity === 'common' ? 4 : c.rarity === 'rare' ? 2 : 1;
    for (let i = 0; i < count; i++) pool.push(c.id);
  });
  for (let i = pool.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }
  return pool;
}

// ─── MATTER.JS PHYSICS (engine only — we draw ourselves) ───────────
const { Engine, Runner, Bodies, Body, Composite } = Matter;

const DOME_W = 224, DOME_H = 150;
const ARC_CX = 112, ARC_CY = 112, ARC_R = 109;
const BALL_R = 16, N_ARC = 22;

const engine = Engine.create({ gravity: { y: 2.2 } });
Runner.run(Runner.create(), engine);

const domeCanvas = document.getElementById('domeCanvas');
const dctx = domeCanvas.getContext('2d');
domeCanvas.width  = DOME_W;
domeCanvas.height = DOME_H;

// Build dome walls
(function () {
  const b = [];
  // Upper dome arc (semicircle from left to right over the top)
  for (let i = 0; i < N_ARC; i++) {
    const a1 = -Math.PI + Math.PI * i / N_ARC;
    const a2 = -Math.PI + Math.PI * (i + 1) / N_ARC;
    const x1 = ARC_CX + ARC_R * Math.cos(a1), y1 = ARC_CY + ARC_R * Math.sin(a1);
    const x2 = ARC_CX + ARC_R * Math.cos(a2), y2 = ARC_CY + ARC_R * Math.sin(a2);
    b.push(Bodies.rectangle(
      (x1 + x2) / 2, (y1 + y2) / 2,
      Math.hypot(x2 - x1, y2 - y1) + 2, 10,
      { isStatic: true, angle: Math.atan2(y2 - y1, x2 - x1), friction: 0.4, restitution: 0.15 }
    ));
  }
  // Side walls bridge the arc endpoints (y=ARC_CY=112) down to the canvas bottom.
  // funnelTopY = DOME_H exactly — zero funnel geometry inside the visible canvas.
  const sideH  = DOME_H - ARC_CY;  // 38px — side walls reach y=150 (canvas bottom)
  const sideMY = ARC_CY + sideH / 2;
  b.push(Bodies.rectangle(3, sideMY, 8, sideH, { isStatic: true, friction: 0.4 }));
  b.push(Bodies.rectangle(DOME_W - 3, sideMY, 8, sideH, { isStatic: true, friction: 0.4 }));

  // Funnel slopes start at the canvas bottom (y=DOME_H=150) — entirely hidden by machine body.
  // Steeper drop (35px) ensures balls slide reliably toward the chute.
  const gapHalf    = BALL_R + 3;           // 19px — one ball fits with 3px clearance each side
  const funnelTopY = DOME_H;               // 150 — exactly at canvas bottom, nothing visible
  const funnelBotY = DOME_H + 35;         // 185 — funnel throat, well below canvas
  const lx1 = 3,         ly1 = funnelTopY;
  const lx2 = ARC_CX - gapHalf, ly2 = funnelBotY;
  b.push(Bodies.rectangle((lx1+lx2)/2, (ly1+ly2)/2, Math.hypot(lx2-lx1,ly2-ly1)+2, 8,
    { isStatic:true, angle:Math.atan2(ly2-ly1,lx2-lx1), friction:0.5, restitution:0.08 }));
  const rx1 = DOME_W - 3, ry1 = funnelTopY;
  const rx2 = ARC_CX + gapHalf, ry2 = funnelBotY;
  b.push(Bodies.rectangle((rx1+rx2)/2, (ry1+ry2)/2, Math.hypot(rx2-rx1,ry2-ry1)+2, 8,
    { isStatic:true, angle:Math.atan2(ry2-ry1,rx2-rx1), friction:0.5, restitution:0.08 }));

  // Narrow chute below funnel throat — single ball queues here, hidden by machine body
  const chuteH = 55;
  b.push(Bodies.rectangle(ARC_CX - gapHalf - 4, funnelBotY + chuteH/2, 8, chuteH,
    { isStatic:true, friction:0.1 }));
  b.push(Bodies.rectangle(ARC_CX + gapHalf + 4, funnelBotY + chuteH/2, 8, chuteH,
    { isStatic:true, friction:0.1 }));
  // Chute floor — dispensed ball rests here until crank releases it
  b.push(Bodies.rectangle(ARC_CX, funnelBotY + chuteH + 5, gapHalf * 6, 10,
    { isStatic:true, friction:0.6 }));

  Composite.add(engine.world, b);
})();

// Draw loop — clear canvas each frame, draw gradient balls manually
let ballBodies = [];

function drawBall(b) {
  const { x, y } = b.position;
  const r = BALL_R;
  const s = BALL_STYLES[b.colorKey] || BALL_STYLES['b-common'];
  dctx.save();
  if (s.glow) {
    dctx.shadowBlur = 14; dctx.shadowColor = s.glow;
    dctx.beginPath(); dctx.arc(x, y, r, 0, Math.PI * 2);
    dctx.fillStyle = s.mid; dctx.fill();
    dctx.shadowBlur = 0;
  }
  const g = dctx.createRadialGradient(x - r * 0.32, y - r * 0.38, r * 0.06, x, y, r);
  g.addColorStop(0, s.hi); g.addColorStop(0.55, s.mid); g.addColorStop(1, s.lo);
  dctx.beginPath(); dctx.arc(x, y, r, 0, Math.PI * 2);
  dctx.fillStyle = g; dctx.fill();
  dctx.beginPath(); dctx.arc(x, y, r, 0, Math.PI * 2); dctx.clip();
  dctx.beginPath();
  dctx.ellipse(x - r * 0.3, y - r * 0.33, r * 0.33, r * 0.22, -Math.PI / 6, 0, Math.PI * 2);
  dctx.fillStyle = 'rgba(255,255,255,0.5)'; dctx.fill();
  dctx.restore();
}

(function drawLoop() {
  requestAnimationFrame(drawLoop);
  dctx.clearRect(0, 0, DOME_W, DOME_H);
  // Only draw balls that are in the visible canvas area (above the machine body / blue line)
  for (const b of ballBodies) {
    if (b.position.y < DOME_H + BALL_R) drawBall(b);
  }
})();

function createPhysicsBalls(pool) {
  ballBodies.forEach(b => Composite.remove(engine.world, b));
  ballBodies = [];
  const D = BALL_R * 2 + 4;
  pool.forEach((charId, i) => {
    const ch = CHARS.find(c => c.id === charId);
    // Spawn all balls in visible dome — funnel slopes guide them to the hidden chute naturally
    const col = i % 5;
    const row = Math.floor(i / 5);
    const x = ARC_CX - 2 * D + col * D + (Math.random() - 0.5) * 8;
    const baseY = 22 + row * D; // rows at y≈22, 58, 94, 130
    const y = baseY + (Math.random() - 0.5) * 4;
    const body = Bodies.circle(x, y, BALL_R, {
      restitution: 0.12, friction: 0.28, frictionAir: 0.042
    });
    body.colorKey = ch.ballClass;
    body.charId   = charId;
    ballBodies.push(body);
    Composite.add(engine.world, body);
  });
}

// ─── STATE ─────────────────────────────────────────────────────────
let crankTurns   = 0;
let crankRotation = 0;
let pulling      = false;
let totalPulls   = 0;
let collection   = {};
const TURNS_NEEDED = 3;

// ─── DOM REFS ──────────────────────────────────────────────────────
const crankBtn    = document.getElementById('crankBtn');
const crankInner  = document.getElementById('crankInner');
const dots        = [document.getElementById('dot0'), document.getElementById('dot1'), document.getElementById('dot2')];
const ledDisplay  = document.getElementById('ledDisplay');
const trayHint    = document.getElementById('trayHint');
const trayBall    = document.getElementById('trayBall');
const refillWrap  = document.getElementById('refillWrap');
const refillBtn   = document.getElementById('refillBtn');
const hintLine    = document.getElementById('hintLine');
const machineWrap = document.getElementById('machineWrap');
const modal       = document.getElementById('modal');
const rarityBanner = document.getElementById('rarityBanner');
const charStage   = document.getElementById('charStage');
const rarityStars = document.getElementById('rarityStars');
const charName    = document.getElementById('charName');
const charFlavor  = document.getElementById('charFlavor');
const closeBtn    = document.getElementById('closeBtn');
const collectionWrap  = document.getElementById('collectionWrap');
const collectionChips = document.getElementById('collectionChips');

// ─── INIT ──────────────────────────────────────────────────────────
createPhysicsBalls(buildBallPool());

// ─── DOTS ──────────────────────────────────────────────────────────
function updateDots(n) {
  dots.forEach((d, i) => d.classList.toggle('lit', i < n));
}

// ─── CRANK ─────────────────────────────────────────────────────────
crankBtn.addEventListener('click', onCrankClick);
crankBtn.addEventListener('touchend', e => { e.preventDefault(); onCrankClick(); });

function onCrankClick() {
  if (pulling) return;
  if (ballBodies.length === 0) return;

  crankTurns++;
  crankRotation += 120;
  updateDots(crankTurns);
  crankInner.style.transform = `rotate(${crankRotation}deg)`;

  // Shake machine + jostle balls so they settle into gaps
  machineWrap.classList.remove('shaking');
  void machineWrap.offsetWidth; // force reflow to restart animation
  machineWrap.classList.add('shaking');
  machineWrap.addEventListener('animationend', () => machineWrap.classList.remove('shaking'), { once: true });

  // Symmetric jostle — helps balls redistribute on the slopes without pushing them up
  ballBodies.forEach(b => {
    Body.applyForce(b, b.position, {
      x: (Math.random() - 0.5) * 0.028,
      y: (Math.random() - 0.3) * 0.012  // slight downward bias
    });
  });

  playClick();

  if (crankTurns >= TURNS_NEEDED) {
    crankTurns = 0;
    updateDots(0);
    // Funnel geometry ensures the chute ball is always lowest — no violent pre-settle needed
    setTimeout(dispense, 180);
  } else {
    hintLine.textContent = crankTurns === 1 ? 'Keep turning...' : 'One more turn!';
  }
}

// ─── DISPENSE ──────────────────────────────────────────────────────
function dispense() {
  if (ballBodies.length === 0) return;
  pulling = true;
  hintLine.textContent = '';

  // Dispense the bottommost ball (highest y = lowest visual position)
  const bottomBody = ballBodies.reduce((max, b) => b.position.y > max.position.y ? b : max, ballBodies[0]);
  const charId = bottomBody.charId;
  const ch = CHARS.find(c => c.id === charId);
  totalPulls++;
  ledDisplay.textContent = `PULLS: ${totalPulls}`;

  const idx = ballBodies.indexOf(bottomBody);
  ballBodies.splice(idx, 1);
  Composite.remove(engine.world, bottomBody); // was below canvas (chute) — just remove

  // Jostle remaining balls so they cascade down the funnel slopes into the vacated chute
  ballBodies.forEach(b => {
    Body.applyForce(b, b.position, {
      x: (Math.random() - 0.5) * 0.014,
      y: 0.012
    });
  });

  machineWrap.classList.add('shaking');
  machineWrap.addEventListener('animationend', () => machineWrap.classList.remove('shaking'), { once: true });

  trayHint.style.display = 'none';
  trayBall.className = `tray-ball ${ch.ballClass} dropping`;
  trayBall.style.display = 'block';
  trayBall.dataset.charId = charId;

  playDispense();

  trayBall.addEventListener('animationend', () => {
    trayBall.classList.remove('dropping');
    trayBall.classList.add('waiting');
    hintLine.textContent = 'Click the ball to open it!';
    pulling = false;
    if (ballBodies.length === 0) showEmptyState();
  }, { once: true });
}

// ─── BALL CLICK ────────────────────────────────────────────────────
trayBall.addEventListener('click', onBallClick);
trayBall.addEventListener('touchend', e => { e.preventDefault(); onBallClick(); });

function onBallClick() {
  if (!trayBall.classList.contains('waiting')) return;
  const charId = trayBall.dataset.charId;
  if (!charId) return;

  trayBall.classList.remove('waiting');
  trayBall.classList.add('popping');
  playPop();

  trayBall.addEventListener('animationend', () => {
    trayBall.style.display = 'none';
    trayBall.classList.remove('popping');
    trayHint.style.display = 'block';
    if (ballBodies.length > 0) trayHint.textContent = 'Turn 3× to dispense!';
    showReveal(charId);
  }, { once: true });
}

// ─── REVEAL ────────────────────────────────────────────────────────
function showReveal(charId) {
  const ch = CHARS.find(c => c.id === charId);
  rarityBanner.textContent = ch.rarity === 'ultra' ? 'ULTRA RARE ✦' : ch.rarity === 'rare' ? 'RARE' : 'COMMON';
  rarityBanner.className   = 'rarity-banner ' + ch.rarity;
  rarityStars.textContent  = ch.stars;
  charName.textContent     = ch.name;
  charFlavor.textContent   = ch.flavor;
  charStage.innerHTML      = ch.svg;
  charStage.classList.remove('popped');

  modal.classList.add('open');
  setTimeout(() => {
    charStage.classList.add('popped');
    spawnSparkles(ch.rarity);
  }, 180);

  if (!collection[ch.id]) collection[ch.id] = { count: 0, char: ch };
  collection[ch.id].count++;
  updateCollection(ch.id);
}

closeBtn.addEventListener('click', closeModal);
modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });

function closeModal() {
  modal.classList.remove('open');
  charStage.classList.remove('popped');
  clearSparkles();
  if (ballBodies.length === 0 && !pulling) {
    hintLine.textContent = 'Machine empty! Hit REFILL to go again.';
  }
}

// ─── SPARKLES ──────────────────────────────────────────────────────
function spawnSparkles(rarity) {
  const card = document.getElementById('revealCard');
  const emojis = rarity === 'ultra' ? ['✨','🌟','💫','⭐','🔥'] : rarity === 'rare' ? ['✨','💫','⭐'] : ['✨','⭐'];
  const count = rarity === 'ultra' ? 10 : rarity === 'rare' ? 6 : 4;
  for (let i = 0; i < count; i++) {
    const sp = document.createElement('span');
    sp.className = 'sparkle';
    sp.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    const angle = (i / count) * Math.PI * 2;
    const dist  = 60 + Math.random() * 50;
    sp.style.setProperty('--sx', `${Math.cos(angle) * dist}px`);
    sp.style.setProperty('--sy', `${Math.sin(angle) * dist - 20}px`);
    sp.style.left = '50%';
    sp.style.top  = '38%';
    sp.style.animationDelay = `${i * 0.06}s`;
    card.appendChild(sp);
  }
}
function clearSparkles() { document.querySelectorAll('.sparkle').forEach(s => s.remove()); }

// ─── COLLECTION ────────────────────────────────────────────────────
function updateCollection(newId) {
  collectionWrap.style.display = 'block';
  collectionChips.innerHTML = '';
  Object.values(collection).forEach(({ char: ch, count }) => {
    const chip = document.createElement('div');
    chip.className = 'chip' + (ch.id === newId ? ' new-chip' : '');
    const dot = document.createElement('span');
    const c = BALL_STYLES[ch.ballClass];
    dot.style.cssText = `display:inline-block;width:10px;height:10px;border-radius:50%;background:${c ? c.mid : '#ccc'};border:1px solid rgba(0,0,0,.15);flex-shrink:0`;
    chip.appendChild(dot);
    chip.appendChild(document.createTextNode(` ${ch.name.split(' ')[0]} ×${count}`));
    collectionChips.appendChild(chip);
  });
}

// ─── EMPTY STATE ───────────────────────────────────────────────────
function showEmptyState() {
  trayHint.style.display = 'none';
  refillWrap.classList.add('show');
}

refillBtn.addEventListener('click', () => {
  refillWrap.classList.remove('show');
  trayHint.style.display = 'block';
  trayHint.textContent = 'Turn 3× to dispense!';
  hintLine.textContent = '';
  createPhysicsBalls(buildBallPool());
  crankTurns = 0;
  updateDots(0);
});

// ─── AUDIO ─────────────────────────────────────────────────────────
let audioCtx;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function tone(freq, dur, type = 'sine', gain = 0.16) {
  try {
    const ctx = getAudio();
    const o = ctx.createOscillator(), v = ctx.createGain();
    o.type = type; o.frequency.setValueAtTime(freq, ctx.currentTime);
    o.frequency.exponentialRampToValueAtTime(freq * 0.55, ctx.currentTime + dur);
    v.gain.setValueAtTime(gain, ctx.currentTime);
    v.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    o.connect(v); v.connect(ctx.destination);
    o.start(); o.stop(ctx.currentTime + dur);
  } catch (e) {}
}
function playClick()    { tone(320, 0.07, 'square', 0.11); }
function playDispense() { tone(230, 0.16, 'sine', 0.14); setTimeout(() => tone(180, 0.2, 'sine', 0.11), 90); }
function playPop()      { tone(460, 0.04, 'square', 0.14); setTimeout(() => tone(680, 0.11, 'sine', 0.17), 45); }
</script>
