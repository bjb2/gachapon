<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>ガチャポン ✦ Capsule Toy</title>
<!-- Apply skin + embed mode before any CSS renders to avoid flash of wrong theme. -->
<script>
  (function() {
    var params = new URLSearchParams(location.search);
    document.documentElement.dataset.skin = params.get('customMachine')
      ? 'custom'
      : (params.get('machine') ||
         localStorage.getItem('gachapon:selectedMachine') || 'valkyrie');
    if (params.get('embed') === '1') document.documentElement.classList.add('embed-mode');
  })();
</script>
<style>
  /* Embed mode — used by the creator's live preview iframe. Hides page chrome
     (nav, title, footer) and scales the machine down so the full chassis +
     tray is visible inside the editor's ~460 px stage. */
  html.embed-mode .site-title,
  html.embed-mode .site-sub,
  html.embed-mode .machine-nav,
  html.embed-mode body > p[style] {
    display: none !important;
  }
  html.embed-mode body {
    padding: 4px 8px 8px !important;
    justify-content: flex-start !important;
    overflow: hidden !important;
  }
  html.embed-mode .machine-wrap {
    transform: scale(0.82);
    transform-origin: top center;
    margin-bottom: -70px; /* offset the whitespace the transform leaves behind */
  }
  html.embed-mode .collection-wrap { display: none !important; }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=M+PLUS+Rounded+1c:wght@400;700;900&family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Crimson+Pro:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./src/skins/classic/index.css">
<link rel="stylesheet" href="./src/skins/noir/index.css">
<link rel="stylesheet" href="./src/skins/cyber/index.css">
<link rel="stylesheet" href="./src/skins/forest/index.css">
<link rel="stylesheet" href="./src/skins/modern/index.css">
<link rel="stylesheet" href="./src/skins/valkyrie/index.css">
<style>
  /* Neutral page chrome for designer-authored custom machines. The custom
     chassis is fully self-contained in its SVG; the page just needs a clean
     stage so it renders centered with no built-in skin styling intruding. */
  html[data-skin="custom"] body {
    background: #F4F4F8;
    background-image:
      radial-gradient(ellipse at 50% 0%, rgba(0,0,0,0.04) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 100%, rgba(0,0,0,0.06) 0%, transparent 50%);
    font-family: 'M PLUS Rounded 1c', sans-serif;
  }
  html[data-skin="custom"] .site-title {
    font-family: 'Orbitron', sans-serif;
    color: #2A2A2A; font-weight: 900; letter-spacing: 0.18em;
  }
  html[data-skin="custom"] .site-sub { color: #888; letter-spacing: 0.25em; }
  html[data-skin="custom"] .machine-nav .mnav-btn { color: #777; border-color: #DDD; background: white; }
  html[data-skin="custom"] .machine-nav .mnav-btn.active { background: #2A2A2A; color: white; border-color: #2A2A2A; }
  /* Make sure the SVG chassis sits cleanly in the wrap. */
  html[data-skin="custom"] .machine-wrap { display: inline-block; }
  html[data-skin="custom"] .machine-wrap.cm-wrap svg.cm-svg { display: block; }
  html[data-skin="custom"] .hint-line { color: #555; font-size: 12px; margin-top: 12px; }
</style>
</head>
<body>
  <h1 class="site-title">ガチャポン</h1>
  <p class="site-sub">CAPSULE TOY MACHINE</p>

  <nav class="machine-nav">
    <a class="mnav-btn" href="?machine=valkyrie" data-machine="valkyrie">valkyrie ✕ truck</a>
    <a class="mnav-btn" href="?machine=classic" data-machine="classic">kawaii</a>
    <a class="mnav-btn" href="?machine=noir"    data-machine="noir">noir</a>
    <a class="mnav-btn" href="?machine=cyber"   data-machine="cyber">cyber</a>
    <a class="mnav-btn" href="?machine=forest"  data-machine="forest">forest</a>
    <a class="mnav-btn" href="?machine=modern"  data-machine="modern">modern</a>
  </nav>
  <script>
    (function() {
      var s = document.documentElement.dataset.skin || 'classic';
      document.querySelectorAll('.mnav-btn[data-machine]').forEach(function(a) {
        if (a.dataset.machine === s) a.classList.add('active');
      });
      // Valkyrie skin: replace site title with the Valkyrie ✕ Truck wordmark
      // (links to the source site) and append a small valkyriextruck.com credit.
      if (s === 'valkyrie') {
        var t = document.querySelector('.site-title');
        if (t) {
          t.innerHTML = '<a href="https://valkyriextruck.com" target="_blank" rel="noopener">' +
            '<span>Valkyrie</span><span class="valk-x">✕</span><span>Truck</span></a>';
        }
        var sub = document.querySelector('.site-sub');
        if (sub) sub.textContent = 'CAPSULE × CHARACTER GACHA';
      }
    })();
  </script>

  <div id="machineWrap"></div>

  <p class="hint-line" id="hintLine"></p>

  <div class="collection-wrap" id="collectionWrap" style="display:none">
    <button type="button" class="collection-toggle" data-collection-toggle aria-expanded="false">
      <span class="collection-label">YOUR COLLECTION</span>
      <span class="collection-count" data-collection-count>0</span>
      <span class="collection-caret" aria-hidden="true">▾</span>
    </button>
    <div class="collection-chips" data-collection-chips hidden></div>
  </div>

  <p class="valk-credit" id="valkCredit" style="display:none">
    A promotional gacha for <a href="https://valkyriextruck.com" target="_blank" rel="noopener">valkyriextruck.com</a>
  </p>
  <script>
    if (document.documentElement.dataset.skin === 'valkyrie') {
      document.getElementById('valkCredit').style.display = 'block';
    }
  </script>

  <p style="margin-top:24px;font-size:10px;color:#999;font-family:'DotGothic16',monospace;letter-spacing:0.15em;">
    <a href="./create.html" style="color:#999;text-decoration:none;">✎ CREATE PRIZES</a>
    &nbsp;·&nbsp;
    <a href="./design.html" style="color:#999;text-decoration:none;">⚙ DESIGN MACHINE</a>
    &nbsp;·&nbsp;
    <a href="https://github.com/bjb2/gachapon" target="_blank" rel="noopener" style="color:#999;text-decoration:none;">GITHUB ↗</a>
  </p>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
